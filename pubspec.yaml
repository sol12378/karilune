name: carilune
description: Carilune advertising platform mock application.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  freezed_annotation: ^2.4.4
  cached_network_image: ^3.4.1
  intl: ^0.19.0
  google_fonts: ^6.2.1
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  freezed: ^2.5.8

flutter:
  uses-material-design: true
  assets:
    - assets/images/
