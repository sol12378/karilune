<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1565C0">
  <title>広告詳細 — カリルネ</title>
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/consumer.css">
</head>
<body class="detail-page">

  <div class="mock-link-bar">
    <a href="consumer.html">← ホーム</a> ·
    <a href="index.html">ポータル</a>
  </div>

  <div class="detail-app">
    <header class="detail-appbar">
      <button class="back-btn" onclick="history.back()" aria-label="戻る">←</button>
      <h1>広告詳細</h1>
    </header>

    <div class="detail-scroll">
      <div class="detail-image-wrap">
        <div class="detail-image thumb-1" id="hero">
          <div class="emoji-hero" id="emoji" aria-hidden="true">🥩</div>
        </div>
      </div>

      <div class="detail-trust">
        <div class="trust-avatar" aria-hidden="true">⛽</div>
        <div>
          <div class="trust-text">○○ガス 名古屋支店からのおすすめ</div>
          <div class="trust-sub">顔の見える担当者が厳選した情報です</div>
        </div>
      </div>

      <div class="detail-content-card">
        <span class="category-chip" id="category">飲食店</span>
        <h2 id="title">週末限定！家族で楽しむ焼肉フェア開催中</h2>
        <div class="company" id="company">名古屋焼肉 炎</div>
        <p class="pr" id="pr">
          国産黒毛和牛を使用した特選コースが今週末限定でお得です。
          ご家族でのお食事、会社宴会にも最適。
          事前予約でドリンクサービス付き。
        </p>
      </div>

      <div class="detail-info-card">
        <div class="info-title">お店情報</div>
        <div class="info-row">
          <span class="label">エリア</span>
          <span class="value" id="area">名古屋市・愛知県</span>
        </div>
        <div class="info-row">
          <span class="label">電話</span>
          <span class="value" id="tel">052-111-2222</span>
        </div>
      </div>
    </div>

    <div class="detail-bottom-bar">
      <button class="btn-favorite" id="favBtn" onclick="toggleSave()">♡ お気に入りに追加</button>
    </div>
  </div>

  <script>
    const ads = {
      '1': {
        emoji: '🥩', bg: 'thumb-1',
        title: '週末限定！家族で楽しむ焼肉フェア開催中',
        company: '名古屋焼肉 炎',
        pr: '国産黒毛和牛を使用した特選コースが今週末限定でお得です。ご家族でのお食事、会社宴会にも最適。事前予約でドリンクサービス付き。',
        category: '飲食店', area: '名古屋市・愛知県', tel: '052-111-2222'
      },
      '2': {
        emoji: '🔧', bg: 'thumb-2',
        title: '会員様限定・ガス機器安全点検無料',
        company: '○○ガス 名古屋支店',
        pr: 'お住まいのガス機器を無料点検いたします。安全・安心なガス生活のために、お気軽にお申し込みください。',
        category: 'ガス・設備', area: '名古屋市・愛知県', tel: '052-000-0000'
      },
      '3': {
        emoji: '🏠', bg: 'thumb-3',
        title: '春の新生活応援セール開催',
        company: '暮らしの雑貨 ひだまり',
        pr: 'キッチン用品から収納グッズまで最大30%OFF。駅前店・オンラインショップ同時開催中。',
        category: '生活雑貨', area: '岐阜県各所', tel: '058-000-0000'
      }
    };

    const id = new URLSearchParams(location.search).get('id') || '1';
    const ad = ads[id] || ads['1'];
    const hero = document.getElementById('hero');
    hero.className = 'detail-image ' + ad.bg;
    document.getElementById('emoji').textContent = ad.emoji;
    document.getElementById('title').textContent = ad.title;
    document.getElementById('company').textContent = ad.company;
    document.getElementById('pr').textContent = ad.pr;
    document.getElementById('category').textContent = ad.category;
    document.getElementById('area').textContent = ad.area;
    document.getElementById('tel').textContent = ad.tel;

    function toggleSave() {
      const btn = document.getElementById('favBtn');
      const saved = btn.classList.toggle('saved');
      btn.textContent = saved ? '♥ お気に入り済み' : '♡ お気に入りに追加';
    }
  </script>
</body>
</html>
